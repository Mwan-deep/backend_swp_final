# ==========================================
# 1. SERVER & SYSTEM
# ==========================================
server.address=0.0.0.0
server.port=${PORT:8080}

# ==========================================
# 2. DATABASE (SQL SERVER)
# ==========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==========================================
# 3. JPA & HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# ==========================================
# 4. GOOGLE DRIVE & UPLOAD SETTINGS
# ==========================================
google.client.id=${GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET}
google.refresh.token=${GOOGLE_REFRESH_TOKEN}
# Folder ID không quá nhạy cảm nhưng có thể cấu hình mềm
google.drive.folder.id=${GOOGLE_DRIVE_FOLDER_ID:1P__SYEF7a3LaBDbAWajJX_lDp-nf1z6-}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ==========================================
# 5. GOOGLE GEMINI AI
# ==========================================
gemini.api.key=${GEMINI_API_KEY}

# ==========================================
# 6. MAIL SENDER (OTP / Quên mật khẩu)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
# CÁC DÒNG BẮT BUỘC PHẢI CÓ ĐỂ GOOGLE KHÔNG CHẶN
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Thêm 3 dòng này để sau này nếu lỗi, nó báo ngay sau 5 giây chứ không bắt đợi 24 giây
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ==========================================
# 7. JWT BẢO MẬT
# ==========================================
jwt.signerToken=${JWT_SECRET}
spring.jwt.signerToken=${JWT_SECRET}

# ==========================================
# 8. OAUTH2 GOOGLE LOGIN
# ==========================================
# Dùng chung biến với phần Google Drive cho đồng bộ
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email, profile

logging.level.org.springframework.security=DEBUG

# ==========================================
# 9. ENCODING
# ==========================================
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

brevo.api.key=${BREVO_API_KEY}